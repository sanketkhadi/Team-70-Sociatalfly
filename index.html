<!DOCTYPE html>
<html>
<head>
    <title>AI Learning System</title>
</head>
<body>

<div id="loginPage">
    <h2>Login / Register</h2>

    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<div id="modePage" style="display:none">
    <h2>Select Mode</h2>
    <button onclick="setMode('online')">Online</button>
    <button onclick="setMode('offline')">Offline</button>
</div>

<div id="mainPage" style="display:none">

    <button onclick="back()">⬅ Back</button>

    <h2>Enter Details</h2>

    <input id="class" placeholder="Class">
    <input id="subject" placeholder="Subject">
    <input id="chapter" placeholder="Chapter">
    <input id="concept" placeholder="Concept">

    <button onclick="loadVideo()">Start Learning</button>

    <div id="video"></div>
    <div id="summary"></div>
    <div id="quiz"></div>

</div>

<script src="app.js"></script>
</body>
</html>
